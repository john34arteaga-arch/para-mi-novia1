<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Ti ❤️</title>

    <!-- 💖 FUENTE ROMÁNTICA -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family: 'Poppins', sans-serif;
            text-align:center;
            overflow:hidden;
            animation: aparecer 1.5s ease;
        }

        /* 🌄 MOSAICO */
        .fondo{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            display:grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            z-index:-1;
        }

        /* 📸 CUADRITOS */
        .cuadro{
            background-size: 60%;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 1s ease-in-out;
        }

        /* ✨ ANIMACIÓN */
        @keyframes aparecer{
            from{opacity:0; transform:scale(1.1);}
            to{opacity:1; transform:scale(1);}
        }

        /* PANTALLAS */
        .pantalla{
            position:absolute;
            width:100%;
            height:100%;
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .activa{display:flex;}

        /* 💖 TÍTULOS ROMÁNTICOS */
        h1,h2{
            color:white;
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            text-shadow:0 0 15px black;
        }

        /* BOTONES */
        button{
            padding:12px 25px;
            border:none;
            border-radius:25px;
            background:white;
            color:#ff4b5c;
            margin:10px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            transform: scale(1.1);
        }

        /* 💌 MENSAJE */
        .box{
            background:rgba(0,0,0,0.65);
            padding:25px;
            border-radius:20px;
            max-width:400px;
            color:white;
            font-size:18px;
        }

        /* 🎮 JUEGO */
        .corazon{
            position:absolute;
            font-size:28px;
            cursor:pointer;
            animation: flotar 4s linear;
        }

        @keyframes flotar{
            from{transform: translateY(0);}
            to{transform: translateY(100vh);}
        }

    </style>
</head>

<body>

<!-- 🌄 MOSAICO -->
<div id="fondo" class="fondo"></div>

<!-- 🎵 AUDIO -->
<audio id="audio" loop>
    <source src="tu-audio.mp3" type="audio/mpeg">
</audio>

<!-- 🔐 INICIO -->
<div id="inicio" class="pantalla activa">
    <h1>💖 Tengo algo muy especial para ti 💖</h1>
    <button onclick="entrar()">Entrar ❤️</button>
</div>

<!-- 💖 PRINCIPAL -->
<div id="principal" class="pantalla">
    <h1>💖 Feliz 1 Mes 💖</h1>
    <button onclick="irMensaje()">💌 Has clic aquí mi amor</button>
    <button onclick="irJuego()">🎮 Jugar</button>
</div>

<!-- 💌 MENSAJES -->
<div id="mensaje" class="pantalla">
    <div class="box">
        <h2>💖 Para ti mi amor 💖</h2>
        <p id="textoMensaje"></p>
    </div>

    <!-- 🔥 VOLVER AHORA REGRESA AL INICIO -->
    <button onclick="volverInicio()">⬅️ Volver</button>
    <button onclick="siguiente()">➡️ Siguiente</button>
</div>

<!-- 🎮 JUEGO -->
<div id="juego" class="pantalla">
    <h2>Atrapa los corazones ❤️</h2>
    <p>Puntos: <span id="puntos">0</span></p>
    <button onclick="volver()">← volver</button>
</div>

<script>

    /* 🎵 ENTRAR */
    function entrar(){
        cambiar("inicio","principal");
        document.getElementById("audio").play();
    }

    function cambiar(a,b){
        document.getElementById(a).classList.remove("activa");
        document.getElementById(b).classList.add("activa");
    }

    function irMensaje(){cambiar("principal","mensaje");}
    function irJuego(){cambiar("principal","juego");}

    /* 🔥 VOLVER AL INICIO */
    function volverInicio(){
        cambiar("mensaje","inicio");
    }

    function volver(){
        cambiar("juego","principal");
    }

    /* 💌 MENSAJES */
    let mensajes=[
    "Desde que llegaste a mi vida, todo cambió de una manera que no puedo explicar con palabras 💖...",
    "Cada día contigo es un regalo que valoro con todo mi corazón 😘...",
    "No quiero solo compartir momentos contigo… quiero una vida entera ❤️...",
    "Eres mi lugar favorito en todo el mundo 🌎💖...",
    "Prometo cuidarte y amarte cada día más 💫...",
    "Tu loquito está completamente enamorado de ti 😘💕..."
    ];

    let index=0;
    let texto=document.getElementById("textoMensaje");

    function mostrarMensaje(){
        texto.innerText=mensajes[index];
    }

    function siguiente(){
        index=(index+1)%mensajes.length;
        mostrarMensaje();
    }

    mostrarMensaje();

    /* 📸 FOTOS */
    let fotos=["miamor1.jpg","miamor2.jpg","miamor3.jpg"];

    let fondo=document.getElementById("fondo");

    for(let i=0;i<24;i++){
        let div=document.createElement("div");
        div.className="cuadro";
        fondo.appendChild(div);
    }

    let cuadros=document.querySelectorAll(".cuadro");
    let i=0;

    function cambiarFotos(){
        cuadros.forEach(c=>{
            c.style.backgroundImage="url('"+fotos[i]+"')";
        });
        i=(i+1)%fotos.length;
    }

    setInterval(cambiarFotos,3000);
    cambiarFotos();

    /* 🎮 JUEGO */
    let puntos=0;

    function crearCorazon(){
        if(!document.getElementById("juego").classList.contains("activa")) return;

        let c=document.createElement("div");
        c.className="corazon";
        c.innerHTML="❤️";
        c.style.left=Math.random()*90+"vw";

        c.onclick=()=>{
            puntos++;
            document.getElementById("puntos").innerText=puntos;
            c.remove();
        };

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),4000);
    }

    setInterval(crearCorazon,700);

</script>

</body>
</html>
